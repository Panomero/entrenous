<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Entre Nous — Collection</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;padding-bottom:2rem}

.header{padding:1.25rem 1.25rem 0.75rem;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.brand{font-family:Georgia,serif;font-size:1rem;font-style:italic;color:#D4AF6A;letter-spacing:0.05em}
.header-sub{font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px;text-transform:uppercase;letter-spacing:0.1em}

.intro{padding:1.25rem 1.25rem 0.5rem}
.intro-text{font-size:14px;line-height:1.75;color:rgba(242,242,242,0.6)}

.section-label{padding:0.75rem 1.25rem 0.5rem;font-size:11px;color:#D4AF6A;text-transform:uppercase;letter-spacing:0.1em;font-weight:600}

.wines{padding:0 1rem}

.wine-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:16px;margin-bottom:0.75rem;overflow:hidden;transition:border-color 0.2s}
.wine-card:active{border-color:rgba(212,175,106,0.3)}

.wine-body{padding:1rem 1rem 0.75rem}
.wine-name{font-size:1rem;font-weight:600;color:#fff;line-height:1.3;margin-bottom:0.5rem}

.wine-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem}
.tag{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.tag-type{background:rgba(212,175,106,0.12);border:1px solid rgba(212,175,106,0.25);color:#D4AF6A}
.tag-instock{background:rgba(80,200,100,0.1);border:1px solid rgba(80,200,100,0.25);color:#6ddb8a}
.tag-preorder{background:rgba(212,175,106,0.1);border:1px solid rgba(212,175,106,0.25);color:#D4AF6A}

.wine-details{display:flex;gap:1rem;margin-bottom:0.875rem}
.detail{flex:1}
.detail-label{font-size:10px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px}
.detail-val{font-size:13px;color:rgba(255,255,255,0.8)}

.wine-footer{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1rem;border-top:1px solid rgba(255,255,255,0.05);background:rgba(255,255,255,0.02)}
.price{font-size:1.1rem;font-weight:700;color:#D4AF6A}
.price-sub{font-size:11px;color:rgba(255,255,255,0.3);margin-top:1px}
.order-btn{background:#D4AF6A;color:#0a0a0a;border:none;border-radius:10px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.order-btn:active{opacity:0.8}

.loading{text-align:center;padding:4rem 2rem}
.loading-brand{font-family:Georgia,serif;font-size:1.2rem;font-style:italic;color:#D4AF6A;margin-bottom:0.75rem}
.loading-sub{font-size:13px;color:rgba(255,255,255,0.3)}

.empty{text-align:center;padding:4rem 2rem}
.empty-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.4}
.empty-text{font-size:14px;color:rgba(255,255,255,0.3)}

.success{text-align:center;padding:4rem 2rem}
.success-icon{font-size:3rem;margin-bottom:1rem}
.success-title{font-size:1.2rem;font-weight:600;color:#fff;margin-bottom:0.5rem}
.success-sub{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6}

/* Divider line */
.divider{height:1px;background:rgba(255,255,255,0.06);margin:0.25rem 1.25rem}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-brand">Entre Nous</div>
    <div class="loading-sub">Loading collection...</div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = 'https://entre-nous-bot-production.up.railway.app';
const lang = tg.initDataUnsafe?.user?.language_code || 'en';
const startParam = tg.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp') || '';
const postId = (startParam.replace('col_', '')) || new URLSearchParams(window.location.search).get('post_id') || '';

const T = {
  ru: {
    subtitle: 'Коллекция',
    instock: 'В наличии',
    preorder: 'Предзаказ',
    delivery: 'Доставка',
    quantity: 'Количество',
    bottles: 'бут.',
    perBottle: 'за бутылку',
    order: 'Заказать',
    wines: 'Вина коллекции',
    empty: 'Вина скоро появятся',
    successTitle: 'Заявка принята!',
    successSub: 'Откройте чат с нами — мы свяжемся в ближайшее время.',
  },
  fr: {
    subtitle: 'Collection',
    instock: 'En stock',
    preorder: 'Pré-commande',
    delivery: 'Livraison',
    quantity: 'Quantité',
    bottles: 'btl.',
    perBottle: 'par bouteille',
    order: 'Commander',
    wines: 'Vins de la collection',
    empty: 'Les vins arrivent bientôt',
    successTitle: 'Demande reçue!',
    successSub: 'Ouvrez notre chat — nous vous contacterons bientôt.',
  },
  en: {
    subtitle: 'Collection',
    instock: 'In stock',
    preorder: 'Pre-order',
    delivery: 'Delivery',
    quantity: 'Available',
    bottles: 'btl.',
    perBottle: 'per bottle',
    order: 'Order',
    wines: 'Collection wines',
    empty: 'Wines coming soon',
    successTitle: 'Request received!',
    successSub: 'Open our chat — we will get back to you shortly.',
  }
};

const t = T[lang.startsWith('ru')?'ru':lang.startsWith('fr')?'fr':'en'];

async function load() {
  try {
    // Load post text
    const SOURCE_ID = '1W8VBEXEuL0HC3vJwxwAs05PhhMi3fdwads_GFKkUYic';
    const POSTS_GID = '850944697';
    let postText = '';
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SOURCE_ID}/export?format=csv&gid=${POSTS_GID}&t=${Date.now()}`;
      const res = await fetch(url);
      const csv = await res.text();
      const rows = csv.split('\n').map(r => {
        const cells = []; let inQ = false, cur = '';
        for (const ch of r) {
          if (ch==='"'){inQ=!inQ;}
          else if (ch===','&&!inQ){cells.push(cur.trim());cur='';}
          else cur+=ch;
        }
        cells.push(cur.trim()); return cells;
      });
      for (const row of rows.slice(1)) {
        if (String(row[0]).trim() === String(postId).trim()) {
          postText = row[3] || '';
          break;
        }
      }
    } catch(e){}

    // Load wines
    const wRes = await fetch(`${API_URL}/collection/load?post_id=${postId}`);
    const wData = await wRes.json();
    const wines = wData.wines || [];

    render(postText, wines);
  } catch(e) {
    render('', []);
  }
}

function render(postText, wines) {
  const app = document.getElementById('app');

  if (wines.length === 0) {
    app.innerHTML = `
      <div class="header"><div class="brand">Entre Nous</div><div class="header-sub">${t.subtitle}</div></div>
      ${postText ? `<div class="intro"><div class="intro-text">${postText.replace(/\n/g,'<br>')}</div></div>` : ''}
      <div class="empty"><div class="empty-icon">🍷</div><div class="empty-text">${t.empty}</div></div>`;
    return;
  }

  const cardsHtml = wines.map((w, i) => {
    const instock = (w.available || 'yes') === 'yes';
    const deliveryText = instock
      ? (w.delivery || 'Available immediately')
      : (w.delivery || '1-2 weeks');
    const qty = w.quantity ? `${w.quantity} ${t.bottles}` : '—';
    const price = w.price ? `${w.price} EUR` : '';

    return `
    <div class="wine-card">
      <div class="wine-body">
        <div class="wine-name">${esc(w.name || '—')}</div>
        <div class="wine-tags">
          ${w.type ? `<span class="tag tag-type">${esc(w.type)}</span>` : ''}
          <span class="tag ${instock?'tag-instock':'tag-preorder'}">${instock ? t.instock : t.preorder}</span>
        </div>
        <div class="wine-details">
          <div class="detail">
            <div class="detail-label">${t.delivery}</div>
            <div class="detail-val">${esc(deliveryText)}</div>
          </div>
          <div class="detail">
            <div class="detail-label">${t.quantity}</div>
            <div class="detail-val">${esc(qty)}</div>
          </div>
        </div>
      </div>
      <div class="wine-footer">
        <div>
          <div class="price">${esc(price)}</div>
          <div class="price-sub">${t.perBottle}</div>
        </div>
        ${price ? `<button class="order-btn" onclick="placeOrder('${esc(w.name)}','${esc(price)}')">${t.order}</button>` : ''}
      </div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header"><div class="brand">Entre Nous</div><div class="header-sub">${t.subtitle}</div></div>
    ${postText ? `<div class="intro"><div class="intro-text">${postText.replace(/\n/g,'<br>')}</div></div><div class="divider"></div>` : ''}
    <div class="section-label">${t.wines}</div>
    <div class="wines">${cardsHtml}</div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
}

async function placeOrder(wine, price) {
  const user = tg.initDataUnsafe?.user;
  const user_id = user?.id;
  const name = user ? (user.first_name + (user.last_name ? ' '+user.last_name : '')) : 'Client';

  document.getElementById('app').innerHTML = `
    <div class="success"><div class="success-icon">⏳</div><div class="success-title">Processing...</div></div>`;

  try {
    await fetch(API_URL + '/order', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'order', wine, price, name, user_id, lang_code: lang})
    });
    document.getElementById('app').innerHTML = `
      <div class="success">
        <div class="success-icon">🍷</div>
        <div class="success-title">${t.successTitle}</div>
        <div class="success-sub">${t.successSub}</div>
      </div>`;
    tg.openTelegramLink('https://t.me/entrenous_access_bot');
    setTimeout(() => tg.close(), 1800);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="loading"><div class="loading-brand">Entre Nous</div><div class="loading-sub">Error. Please try again.</div></div>`;
  }
}

load();
</script>
</body>
</html>
