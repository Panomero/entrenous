<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Nous — Private Access</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A3;
    --dark: #0A0A0A;
    --dark-2: #141414;
    --cream: #F5F0E8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,168,76,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
    max-width: 480px;
    width: 100%;
    animation: fadeUp 1.2s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 2rem;
    animation: expand 1.5s ease 0.3s forwards;
    transform: scaleX(0);
  }

  @keyframes expand {
    to { transform: scaleX(1); }
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--cream);
    line-height: 1;
    margin-bottom: 0.3rem;
    animation: fadeUp 1.2s ease 0.2s forwards;
    opacity: 0;
  }

  .logo em {
    font-style: italic;
    color: var(--gold);
  }

  .tagline {
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 3.5rem;
    animation: fadeUp 1.2s ease 0.4s forwards;
    opacity: 0;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 3rem;
    animation: fadeUp 1.2s ease 0.5s forwards;
    opacity: 0;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  }

  .divider-text {
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(245,240,232,0.4);
  }

  .intro {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    font-style: italic;
    color: rgba(245,240,232,0.7);
    line-height: 1.8;
    margin-bottom: 3rem;
    animation: fadeUp 1.2s ease 0.6s forwards;
    opacity: 0;
  }

  .channels {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 2rem;
    animation: fadeUp 1.2s ease 0.7s forwards;
    opacity: 0;
  }

  .channel-group {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px;
    padding: 1.2rem 1.5rem;
  }

  .channel-label {
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .channel-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.2);
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.3s ease;
    border-radius: 1px;
    cursor: pointer;
    border: none;
    font-family: 'Montserrat', sans-serif;
  }

  .btn-tg {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold-light);
  }

  .btn-tg:hover {
    background: rgba(201,168,76,0.2);
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-1px);
  }

  .btn-wa {
    background: rgba(37,211,102,0.05);
    border: 1px solid rgba(37,211,102,0.2);
    color: rgba(37,211,102,0.7);
  }

  .btn-wa:hover {
    background: rgba(37,211,102,0.1);
    border-color: rgba(37,211,102,0.4);
    color: rgb(37,211,102);
    transform: translateY(-1px);
  }

  .btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .recommended {
    background: var(--gold);
    color: var(--dark);
    font-size: 0.45rem;
    letter-spacing: 0.2em;
    padding: 0.2rem 0.5rem;
    border-radius: 1px;
    vertical-align: middle;
    margin-left: 0.3rem;
  }

  .tg-main {
    animation: fadeUp 1.2s ease 0.8s forwards;
    opacity: 0;
    margin-bottom: 2rem;
  }

  .btn-tg-main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.7rem;
    padding: 1rem 2rem;
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light);
    transition: all 0.4s ease;
    border-radius: 1px;
    font-family: 'Montserrat', sans-serif;
    width: 100%;
  }

  .btn-tg-main:hover {
    background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.1));
    border-color: var(--gold);
    color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.1);
  }

  .btn-tg-main svg { width: 18px; height: 18px; }

  .note {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: rgba(245,240,232,0.25);
    margin-top: 0.5rem;
    animation: fadeUp 1.2s ease 0.9s forwards;
    opacity: 0;
  }

  .footer-line {
    margin-top: 3rem;
    width: 40px;
    height: 1px;
    background: rgba(201,168,76,0.2);
    margin-left: auto;
    margin-right: auto;
    animation: fadeUp 1.2s ease 1s forwards;
    opacity: 0;
  }
</style>
</head>
