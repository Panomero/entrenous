<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Entre Nous — Order</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#1a1a1a);font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;padding:1.5rem}
.brand{font-family:Georgia,serif;font-size:1.1rem;font-style:italic;color:#B8973A;margin-bottom:1.5rem;text-align:center}
.card{background:var(--tg-theme-secondary-bg-color,#f8f7f5);border-radius:16px;padding:1.5rem;margin-bottom:1rem}
.wine-name{font-size:1.3rem;font-weight:600;margin-bottom:0.5rem}
.wine-meta{font-size:13px;color:var(--tg-theme-hint-color,#6b6b6b);margin-bottom:1rem}
.wine-text{font-size:14px;line-height:1.7;margin-bottom:1.5rem;white-space:pre-wrap}
.price{font-size:1.1rem;font-weight:600;color:#B8973A;margin-bottom:1rem}
.btn{width:100%;padding:1rem;background:#B8973A;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;margin-bottom:0.75rem}
.btn:active{opacity:0.85}
.btn-sec{background:transparent;border:1px solid #B8973A;color:#B8973A}
.loading{text-align:center;padding:3rem;color:var(--tg-theme-hint-color,#6b6b6b)}
.success{text-align:center;padding:2rem}
.success-icon{font-size:3rem;margin-bottom:1rem}
</style>
</head>
<body>

<div class="brand">Entre Nous</div>
<div id="app"><div class="loading">Loading...</div></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const SHEET_ID = '1kgIr-VSU2gXfrNjFTGBr3uzcpcnGQV21GcBQ8QP4Y6Y';
const SOURCE_ID = '1W8VBEXEuL0HC3vJwxwAs05PhhMi3fdwads_GFKkUYic';

// Get post_id from URL or start param
const startParam = tg.initDataUnsafe?.start_param || '';
const urlParams = new URLSearchParams(window.location.search);
const postId = startParam || urlParams.get('post_id') || '';

async function loadPost() {
  if (!postId) {
    showBrowse();
    return;
  }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SOURCE_ID}/export?format=csv&gid=0&t=${Date.now()}`;
    const res = await fetch(url);
    const csv = await res.text();
    const rows = csv.split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
    let post = null;
    for (const row of rows.slice(1)) {
      if (String(row[0]) === String(postId)) {
        post = { id: row[0], date: row[1], channel: row[2], text: row[3] };
        break;
      }
    }
    if (post) showPost(post);
    else showBrowse();
  } catch(e) {
    showBrowse();
  }
}

function showPost(post) {
  const lines = post.text.split('\n');
  const title = lines[0].replace(/[*_]/g, '').trim();
  const body = lines.slice(1).join('\n').trim();
  const priceMatch = post.text.match(/Available:\s*(\d+)\s*btl\s*[··]\s*(\d+)\s*EUR/);
  const price = priceMatch ? `${priceMatch[2]} EUR` : '';
  const avail = priceMatch ? `${priceMatch[1]} bottles available` : '';

  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="wine-name">${title}</div>
      <div class="wine-meta">${avail}</div>
      <div class="wine-text">${body}</div>
      ${price ? `<div class="price">${price} per bottle</div>` : ''}
      <button class="btn" onclick="placeOrder('${title.replace(/'/g,"\\'")}', '${price}')">🛒 Place Order</button>
      <button class="btn btn-sec" onclick="tg.close()">Cancel</button>
    </div>
  `;
}

function showBrowse() {
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="wine-name" style="margin-bottom:0.75rem">Welcome to Entre Nous</div>
      <div class="wine-meta" style="margin-bottom:1rem">Private wine & delicacies selection</div>
      <button class="btn" onclick="contactBot()">🛒 I want to order</button>
    </div>
  `;
}

function placeOrder(wine, price) {
  const user = tg.initDataUnsafe?.user;
  const name = user ? (user.first_name + (user.last_name ? ' ' + user.last_name : '')) : 'Client';
  tg.sendData(JSON.stringify({ action: 'order', wine, price, name }));
  document.getElementById('app').innerHTML = `
    <div class="success">
      <div class="success-icon">🍷</div>
      <div style="font-size:1.1rem;font-weight:600;margin-bottom:0.5rem">Order received!</div>
      <div style="color:var(--tg-theme-hint-color,#6b6b6b);font-size:14px">We will contact you shortly</div>
    </div>
  `;
  setTimeout(() => tg.close(), 2000);
}

function contactBot() {
  tg.sendData(JSON.stringify({ action: 'browse' }));
  setTimeout(() => tg.close(), 500);
}

loadPost();
</script>
</body>
</html>
