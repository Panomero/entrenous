<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Entre Nous</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh}
.header{padding:1.25rem 1.5rem 0.75rem;text-align:center}
.brand{font-family:Georgia,serif;font-size:1.3rem;font-style:italic;color:#D4AF6A;letter-spacing:0.05em}
.content{padding:1rem 1.25rem 2rem}
.wine-title{font-size:1.4rem;font-weight:600;color:#f2f2f2;margin-bottom:0.5rem;line-height:1.3}
.wine-price{font-size:1.1rem;color:#D4AF6A;font-weight:500;margin-bottom:1.25rem}
.wine-body{font-size:14px;line-height:1.8;color:rgba(242,242,242,0.75);margin-bottom:1.5rem}
.divider{height:1px;background:rgba(255,255,255,0.1);margin:1.25rem 0}
.btn{width:100%;padding:1rem;background:#D4AF6A;color:#0a0a0a;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:0.02em}
.btn:active{opacity:0.85;transform:scale(0.98)}
.btn-sec{background:transparent;border:1px solid rgba(212,175,106,0.4);color:#D4AF6A;margin-top:0.75rem}
.loading{text-align:center;padding:4rem 2rem;color:rgba(242,242,242,0.4);font-size:14px}
.success{text-align:center;padding:3rem 2rem}
.success-icon{font-size:3rem;margin-bottom:1rem}
.success-title{font-size:1.2rem;font-weight:600;margin-bottom:0.5rem}
.success-sub{font-size:13px;color:rgba(242,242,242,0.5)}
.avail{display:inline-block;background:rgba(212,175,106,0.15);border:1px solid rgba(212,175,106,0.3);color:#D4AF6A;padding:4px 12px;border-radius:20px;font-size:12px;margin-bottom:1.25rem}
</style>
</head>
<body>
<div class="header"><div class="brand">Entre Nous</div></div>
<div id="app"><div class="loading">Loading...</div></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const SOURCE_ID = '1W8VBEXEuL0HC3vJwxwAs05PhhMi3fdwads_GFKkUYic';
const POSTS_GID = '0';

const startParam = tg.initDataUnsafe?.start_param || new URLSearchParams(window.location.search).get('startapp') || new URLSearchParams(window.location.search).get('post_id') || '';
const postId = startParam;

async function loadPost() {
  if (!postId) { showBrowse(); return; }
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SOURCE_ID}/export?format=csv&gid=${POSTS_GID}&t=${Date.now()}`;
    const res = await fetch(url);
    const csv = await res.text();
    const rows = csv.split('\n').map(r => {
      const cells = []; let inQ = false, cur = '';
      for (const ch of r) {
        if (ch === '"') inQ = !inQ;
        else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      cells.push(cur.trim());
      return cells;
    });
    let post = null;
    for (const row of rows.slice(1)) {
      if (String(row[0]).trim() === String(postId).trim()) {
        post = { id: row[0], date: row[1], channel: row[2], text: row[3] || '' };
        break;
      }
    }
    if (post && post.text) showPost(post);
    else showBrowse();
  } catch(e) { showBrowse(); }
}

function showPost(post) {
  const text = post.text;
  const lines = text.split('\n').filter(l => l.trim());
  const title = lines[0].replace(/[*_🍷🔴⚪🌸🍾🟡🫧]/g, '').trim();
  const priceMatch = text.match(/Available:\s*(\d+)\s*btl\s*[·\u00b7]\s*(\d+)\s*EUR/);
  const price = priceMatch ? `${priceMatch[2]} EUR per bottle` : '';
  const avail = priceMatch ? `${priceMatch[1]} bottles available` : '';
  const body = lines.slice(1).filter(l => !l.includes('Available:') && !l.includes('@entrenous')).join('\n').trim();

  document.getElementById('app').innerHTML = `
    <div class="content">
      <div class="wine-title">${title}</div>
      ${avail ? `<div class="avail">${avail}</div>` : ''}
      ${price ? `<div class="wine-price">${price}</div>` : ''}
      <div class="divider"></div>
      <div class="wine-body">${body.replace(/\n/g,'<br>')}</div>
      <button class="btn" onclick="placeOrder('${title.replace(/'/g,"\\'").replace(/"/g,'\\"')}', '${price}')">Place Order</button>
      <button class="btn btn-sec" onclick="tg.close()">Cancel</button>
    </div>
  `;
}

function showBrowse() {
  document.getElementById('app').innerHTML = `
    <div class="content" style="padding-top:2rem">
      <div class="wine-title" style="margin-bottom:0.75rem">Welcome to Entre Nous</div>
      <div style="font-size:14px;color:rgba(242,242,242,0.5);margin-bottom:1.5rem">Private wine & delicacies selection. Browse our channels and tap Order on any post to get started.</div>
      <button class="btn" onclick="contactBot()">🛒 I want to order</button>
    </div>
  `;
}

const API_URL = 'https://entre-nous-bot-production.up.railway.app';

async function placeOrder(wine, price) {
  const user = tg.initDataUnsafe?.user;
  const user_id = user?.id;
  const name = user ? (user.first_name + (user.last_name ? ' '+user.last_name : '')) : 'Client';
  document.getElementById('app').innerHTML = `
    <div class="success">
      <div class="success-icon">🍷</div>
      <div class="success-title">Processing...</div>
    </div>
  `;
  try {
    await fetch(API_URL + '/order', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'order', wine, price, name, user_id })
    });
    document.getElementById('app').innerHTML = `
      <div class="success">
        <div class="success-icon">🍷</div>
        <div class="success-title">Order received!</div>
        <div class="success-sub">Check your bot chat — we will contact you shortly</div>
      </div>
    `;
    tg.openTelegramLink("https://t.me/entrenous_access_bot");
    setTimeout(() => tg.close(), 500);
  } catch(e) {
    document.getElementById('app').innerHTML = `<div class="loading">Error. Please try again.</div>`;
  }
}

async function contactBot() {
  const user = tg.initDataUnsafe?.user;
  const user_id = user?.id;
  try {
    await fetch(API_URL + '/order', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'browse', user_id })
    });
  } catch(e) {}
  tg.openTelegramLink("https://t.me/entrenous_access_bot");
  tg.close();
}

loadPost();
</script>
</body>
</html>
